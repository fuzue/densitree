{% extends "base.html" %}

{% block extrahead %}
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ config.site_url }}">
  <meta property="og:title" content="{{ config.site_name }} — {{ page.title }}">
  <meta property="og:description" content="{{ config.site_description }}">
  <meta property="og:image" content="{{ config.site_url }}assets/images/social-card.png">
  <meta property="og:site_name" content="densitree">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="{{ config.site_url }}">
  <meta name="twitter:title" content="{{ config.site_name }} — {{ page.title }}">
  <meta name="twitter:description" content="{{ config.site_description }}">
  <meta name="twitter:image" content="{{ config.site_url }}assets/images/social-card.png">

  <!-- Additional -->
  <meta name="author" content="Fuzue Tech">
  <link rel="canonical" href="{{ config.site_url }}">
{% endblock %}
