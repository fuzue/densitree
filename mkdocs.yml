site_name: densitree
site_description: "Density-normalized clustering with spanning tree construction for high-dimensional data. State-of-the-art SPADE implementation in Python."
site_url: https://densitree.fuzue.tech
repo_url: https://github.com/fuzue/densitree
repo_name: fuzue/densitree

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fuzue/densitree
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/densitree/

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            members_order: source
            docstring_style: numpy
            merge_init_into_class: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - User Guide: guide.md
  - Tutorials:
    - Flow Cytometry Analysis: tutorials/flow_cytometry.md
    - Comparing Conditions: tutorials/comparing_conditions.md
  - API Reference:
    - SPADE: api/spade.md
    - SPADEResult: api/result.md
    - Pipeline Steps: api/steps.md
    - Plotting: api/plotting.md
  - Benchmarks:
    - Overview: benchmarks/overview.md
    - Datasets: benchmarks/datasets.md
    - Results: benchmarks/results.md
    - Method Comparison: benchmarks/comparison.md
  - Method:
    - Algorithm: method/algorithm.md
    - Improvements: method/improvements.md
    - References: method/references.md
